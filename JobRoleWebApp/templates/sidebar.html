<aside class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-title" style="color:#2a2b72; font-size:1.1rem; line-height: 1.3; font-weight: 800;">AI Job
            Role<br>Reccommendation System</div>
    </div>

    <ul class="sidebar-nav">
        <li class="{{ 'active' if request.endpoint == 'dashboard' }}">
            <a href="{{ url_for('dashboard') }}" class="nav-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Home
            </a>
        </li>
        <li class="{{ 'active' if request.endpoint == 'upload' }}">
            <a href="{{ url_for('upload') }}" class="nav-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                Upload Resume
            </a>
        </li>
        <li class="{{ 'active' if request.endpoint == 'predict_page' }}">
            <a href="{{ url_for('predict_page') }}" class="nav-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                </svg>
                Predict Role
            </a>
        </li>
        <li class="{{ 'active' if request.endpoint == 'history' }}">
            <a href="{{ url_for('history') }}" class="nav-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                History
            </a>
        </li>
    </ul>

    <div class="sidebar-bottom">
        {% if session.user %}
        <a href="{{ url_for('predict_page') }}" class="btn-new-prediction"
            style="display:block; background:#29227e; color:white; text-align:center; padding:10px; border-radius:6px; margin:0 16px 16px; text-decoration:none; font-size:0.85rem; font-weight: 600;">+
            New Prediction</a>
        <a href="{{ url_for('logout') }}" class="nav-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Logout
        </a>
        {% endif %}
    </div>
</aside>
